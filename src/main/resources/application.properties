server.port=8080
spring.application.name=school-management

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/school_management

spring.ai.mcp.server.name = school-management-mcp
spring.ai.mcp.server.version = 1.0.0
spring.ai.mcp.server.type = SYNC
spring.ai.mcp.server.sse-message-endpoint = /mcp/messages
spring.ai.mcp.server.capabilities.tool = true
spring.ai.mcp.server.capabilities.resource = true

# OpenAI (Spring AI)
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.chat.temperature=0.7

# Auth service
auth.service.url=http://localhost:8083

# Kafka
spring.kafka.bootstrap-servers=localhost:9092

